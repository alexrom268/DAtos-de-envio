<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Formulario de Envío y Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .focus-trigger:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex items-center justify-center p-0 sm:p-4">

    <div class="w-full max-w-md bg-white min-h-screen sm:min-h-auto sm:rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col justify-between">
        
        <div class="p-6">
            <div class="text-center pb-5 border-b border-slate-100 mb-5">
                <div class="w-14 h-14 bg-slate-900 text-white rounded-full flex items-center justify-center text-2xl mx-auto mb-3 shadow">📦</div>
                <h1 class="text-xl font-black text-slate-900 tracking-tight">Datos de Envío y Despacho</h1>
                <p class="text-xs text-slate-400 mt-1">Por favor, ingresa tus datos con precisión para garantizar una entrega perfecta.</p>
            </div>

            <form id="customerForm" onsubmit="enviarDatosGoogle(event)" class="space-y-4">
                
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Teléfono Celular *</label>
                    <div class="flex rounded-lg shadow-sm">
                        <span class="bg-slate-200 text-slate-700 text-sm px-3 border border-r-0 border-slate-300 rounded-l-lg flex items-center font-bold">🇨🇴 +57</span>
                        <input type="tel" id="telefono" pattern="[0-9]{10}" placeholder="Ej: 3001234567" class="w-full text-base p-3 border border-slate-300 rounded-r-lg focus:outline-none focus-trigger transition-all" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Nombre *</label>
                        <input type="text" id="nombre" placeholder="Tu nombre" class="w-full text-base p-3 border border-slate-300 rounded-lg focus:outline-none focus-trigger transition-all" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Apellido *</label>
                        <input type="text" id="apellido" placeholder="Tu apellido" class="w-full text-base p-3 border border-slate-300 rounded-lg focus:outline-none focus-trigger transition-all" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Cédula / CC *</label>
                        <input type="text" id="documento" placeholder="No. Documento" class="w-full text-base p-3 border border-slate-300 rounded-lg focus:outline-none focus-trigger transition-all" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Correo Electrónico</label>
                        <input type="email" id="correo" placeholder="opcional@correo.com" class="w-full text-base p-3 border border-slate-300 rounded-lg focus:outline-none focus-trigger transition-all">
                    </div>
                </div>

                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 flex items-start gap-2.5 my-2">
                    <input type="checkbox" id="oficina_transportadora" class="rounded text-indigo-600 focus:ring-indigo-500 h-5 w-5 mt-0.5 cursor-pointer">
                    <label for="oficina_transportadora" class="text-xs font-semibold text-slate-600 cursor-pointer select-none">Prefiero reclamar en una oficina de la transportadora (No domicilio).</label>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Dirección de Entrega *</label>
                    <input type="text" id="direccion" placeholder="Ej: Calle 10 # 5-20" class="w-full text-base p-3 border border-slate-300 rounded-lg focus:outline-none focus-trigger transition-all" required>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Departamento / Región *</label>
                    <select id="departamento" class="w-full text-base p-3 border border-slate-300 rounded-lg bg-white focus:outline-none focus-trigger transition-all" required>
                        <option value="">Selecciona tu departamento</option>
                        <option value="Bogotá D.C.">Bogotá D.C.</option>
                        <option value="Antioquia">Antioquia</option>
                        <option value="Valle del Cauca">Valle del Cauca</option>
                        <option value="Atlántico">Atlántico</option>
                        <option value="Cundinamarca">Cundinamarca</option>
                        <option value="Santander">Santander</option>
                        <option value="Bolívar">Bolívar</option>
                        <option value="Risaralda">Risaralda</option>
                        <option value="Caldas">Caldas</option>
                        <option value="Otro">Otro Departamento</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Detalles de la dirección</label>
                    <input type="text" id="info_adicional" placeholder="Barrio, Apto, Torre, Conjunto o Indicaciones" class="w-full text-base p-3 border border-slate-300 rounded-lg focus:outline-none focus-trigger transition-all">
                </div>

                <button type="submit" id="btnEnviar" class="w-full bg-slate-900 hover:bg-slate-950 text-white font-bold py-3.5 rounded-xl text-base shadow-md transition-all active:scale-[0.98] mt-4 flex justify-center items-center gap-2">
                    <span>Confirmar mis Datos</span>
                </button>
            </form>
        </div>

        <div class="bg-amber-50 border-t border-amber-200 p-4 text-center text-xs text-amber-800 sm:rounded-b-2xl font-medium">
            ⏳ Debido a nuestro proceso artesanal, solo liberamos 10 unidades por semana. Tu cupo se asegura al enviar este formulario.
        </div>
    </div>

    <script>
        // https://script.google.com/macros/s/AKfycbwBORy-7aBQnFe3iXqx2vQvd5m4ecwRZXt6YGJLdh9WbfiauZa9r58gts5BJ76y6tCl/exec
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBORy-7aBQnFe3iXqx2vQvd5m4ecwRZXt6YGJLdh9WbfiauZa9r58gts5BJ76y6tCl/exec";

        async function enviarDatosGoogle(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span> Guardando...`;

            const payload = {
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value,
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                documento: document.getElementById('documento').value,          
                direccion: document.getElementById('direccion').value,
                departamento: document.getElementById('departamento').value,
                info_adicional: document.getElementById('info_adicional').value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Evita problemas de CORS comunes en navegadores móviles
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Como usamos no-cors, asumimos éxito si no salta al catch
                mostrarPantallaExito();
                
            } catch (error) {
                alert('Hubo un inconveniente al enviar tus datos. Por favor verifica tu conexión e inténtalo de nuevo.');
                btn.disabled = false;
                btn.innerText = "Confirmar mis Datos";
            }
        }

        function mostrarPantallaExito() {
            document.body.innerHTML = `
                <div class="w-full max-w-md bg-white min-h-screen sm:min-h-auto sm:rounded-2xl shadow-xl p-8 border border-slate-200 text-center flex flex-col justify-center items-center">
                    <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-4xl mb-4 shadow-sm animate-bounce">✓</div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tight">¡Datos Recibidos!</h1>
                    <p class="text-sm text-slate-500 mt-2 px-4">Tu información de despacho ha sido registrada con éxito en nuestro sistema de fabricación.</p>
                    <p class="text-xs text-indigo-600 font-bold mt-4 bg-indigo-50 px-3 py-1 rounded-full">¡Asegura el turno de fabricación!</p>
                </div>
            `;
        }
    </script>
</body>
</html>
